version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dm_postgres
    environment:
      POSTGRES_DB: dm_advogados
      POSTGRES_USER: dm_user
      POSTGRES_PASSWORD: dm_password_local
    ports:
      - "5432:5432"
    volumes:
      - dm_postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dm_redis
    ports:
      - "6379:6379"
    volumes:
      - dm_redis_data:/data
    restart: unless-stopped

volumes:
  dm_postgres_data:
  dm_redis_data:
